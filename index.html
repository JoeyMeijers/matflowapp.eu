<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MatFlow — BJJ Training Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #f2f2f7; padding: 24px; }
    .card { background: white; border-radius: 20px; padding: 48px 32px;
            text-align: center; max-width: 340px; width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { width: 72px; height: 72px; background: #5856d6; border-radius: 18px;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 40px; height: 40px; fill: white; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; color: #1c1c1e; }
    p  { color: #6e6e73; font-size: 15px; margin: 0 0 28px; line-height: 1.5; }
    .btn { display: block; background: #000; color: white; text-decoration: none;
           border-radius: 14px; padding: 16px 32px; font-size: 17px; font-weight: 600; }
    .btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
    </div>
    <h1>MatFlow</h1>
    <p>The BJJ training tracker. Log sessions, track techniques, and train smarter.</p>
    <a class="btn" href="https://apps.apple.com/app/id6773001800">Download on the App Store</a>
  </div>
</body>
</html>
